# Flume colors for lsd.
# lsd 1.1.x uses crossterm color values; use xterm-256 approximations
# instead of #RRGGBB so the theme is actually applied.

name:
  file: 253            # syntax_primary (#d6d2e8)
  dir: 73             # accent (#6aa6bc)
  pipe: 116            # cyan (#8fc9d2)
  symlink: 116         # cyan (#8fc9d2)
  block-device: 140    # magenta (#b99add)
  char-device: 140     # magenta (#b99add)
  socket: 140          # magenta (#b99add)
  special: 175         # syntax_special (#df8fbc)

user: 103              # muted (#8a85a6)
group: 60             # placeholder/comment (#67627d)

permission:
  read: 103            # muted (#8a85a6)
  write: 180           # yellow (#d8b574)
  exec: 144            # green (#a3be8c)
  exec-sticky: 140     # magenta (#b99add)
  no-access: 60       # placeholder/comment (#67627d)
  octal: 110           # bright_blue (#7eb6e8)
  acl: 116             # cyan (#8fc9d2)
  context: 245         # doc_comment (#81889a)

date:
  hour-old: 253        # syntax_primary (#d6d2e8)
  day-old: 103         # muted (#8a85a6)
  older: 60           # placeholder/comment (#67627d)

size:
  none: 60            # placeholder/comment (#67627d)
  small: 103           # muted (#8a85a6)
  medium: 116          # cyan (#8fc9d2)
  large: 180           # yellow (#d8b574)

inode:
  valid: 103           # muted (#8a85a6)
  invalid: 60         # placeholder/comment (#67627d)

links:
  valid: 103           # muted (#8a85a6)
  invalid: 60         # placeholder/comment (#67627d)

tree-edge: 238         # border_variant (#3a3650)

git-status:
  default: 60         # placeholder/comment (#67627d)
  unmodified: 60      # placeholder/comment (#67627d)
  ignored: 60         # placeholder/comment (#67627d)
  new-in-index: 144    # green (#a3be8c)
  new-in-workdir: 144  # green (#a3be8c)
  typechange: 180      # yellow (#d8b574)
  deleted: 174         # red (#d47b86)
  renamed: 73         # accent (#6aa6bc)
  modified: 180        # yellow (#d8b574)
  conflicted: 174      # bright_red (#e18a94)
